<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>矩阵接水管-OLED版</title>
    <style>
        :root {
            --bg-color: #000000;       /* OLED 纯黑 */
            --grid-bg: #09090b;        /* 深色网格底框 */
            --cell-bg: #141418;        /* 格子背景 */
            --pipe-empty: #223828;     /* 空管道暗绿 */
            --pipe-water: #00ff66;     /* 荧光绿流水 */
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
            /* 禁用手机双击缩放和长按菜单 */
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        h1 {
            font-size: 22px;
            margin: 5px 0;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--pipe-water);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }

        /* 游戏模式选择器 */
        .mode-selector {
            display: flex;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 12px;
            width: 90vw;
            max-width: 400px;
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 8px 5px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--pipe-water);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 400px;
            margin-bottom: 12px;
            font-size: 14px;
            background: #111;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #222;
            box-sizing: border-box;
        }
        .status-val {
            color: var(--pipe-water);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
        }

        /* 游戏核心区域包装器（彻底解决手机侧边越界） */
        .game-wrapper {
            width: 92vw;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 进出水口提示栏 */
        .io-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--pipe-water);
            font-weight: bold;
            padding: 0 4px;
        }
        .io-blink {
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.6; text-shadow: 0 0 2px var(--pipe-water); }
            to { opacity: 1; text-shadow: 0 0 8px var(--pipe-water); }
        }

        /* 10x10 网格：宽高完全基于容器等比缩放 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            background-color: var(--grid-bg);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #222;
            box-shadow: 0 0 20px rgba(0,255,102,0.05);
            aspect-ratio: 1 / 1; /* 锁定正方形 */
            width: 100%;
            box-sizing: border-box;
        }

        /* 单个格子 */
        .cell {
            background-color: var(--cell-bg);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .pipe-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 纯百分比自适应的阀门核心与分支 */
        .pipe-core {
            position: absolute;
            top: 32%;
            left: 32%;
            width: 36%;
            height: 36%;
            background-color: var(--pipe-empty);
            border-radius: 2px;
            z-index: 2;
            transition: background-color 0.25s, box-shadow 0.25s;
        }

        .pipe-branch {
            position: absolute;
            background-color: var(--pipe-empty);
            z-index: 1;
            transition: background-color 0.25s, box-shadow 0.25s;
        }
        /* 四方向分支通过百分比完美对齐中心 */
        .branch-0 { top: 0; left: 42%; width: 16%; height: 36%; }
        .branch-1 { top: 42%; right: 0; width: 36%; height: 16%; }
        .branch-2 { bottom: 0; left: 42%; width: 16%; height: 36%; }
        .branch-3 { top: 42%; left: 0; width: 36%; height: 16%; }

        /* 绿色流水注入状态 */
        .filled .pipe-core {
            background-color: var(--pipe-water);
            box-shadow: 0 0 8px var(--pipe-water);
        }
        .filled .pipe-branch {
            background-color: var(--pipe-water);
            box-shadow: 0 0 8px var(--pipe-water);
        }

        /* 控制按钮 */
        .btn {
            margin-top: 15px;
            width: 92vw;
            max-width: 420px;
            padding: 12px 0;
            background-color: #111;
            color: var(--pipe-water);
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:active {
            background-color: #222;
        }

        /* 通关弹窗 */
        .win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .win-overlay.show { opacity: 1; pointer-events: auto; }
        .win-box {
            background: #0a0a0a;
            padding: 25px 40px;
            border-radius: 12px;
            border: 1px solid var(--pipe-water);
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.3);
            width: 80%;
            max-width: 320px;
        }
        .win-box h2 { color: var(--pipe-water); font-size: 24px; margin-bottom: 12px; }
        .medal { color: #ffd700; font-size: 15px; margin: 10px 0; font-weight: bold; }
    </style>

<link rel="manifest" href="manifest.json">
<script>
if("service-worker" in navigator) navigator.serviceWorker.register("sw.js");
window.addEventListener("click", function(){ var d=document.documentElement; (d.requestFullscreen||d.webkitRequestFullScreen).call(d); }, {once:true});
</script>
</head>
<body>

    <h1>矩阵引水关卡</h1>

    <div class="mode-selector">
        <button id="mode-strict" class="mode-btn" onclick="switchMode(true)">严格模式 (无分叉)</button>
        <button id="mode-score" class="mode-btn" onclick="switchMode(false)">得分模式 (多连通)</button>
    </div>

    <div class="status-bar">
        <div>通水面积: <span id="water-count" class="status-val">0</span> / 100</div>
        <div>实时得分: <span id="live-score" class="status-val">0</span></div>
    </div>

    <div class="game-wrapper">
        <div class="io-bar">
            <span class="io-blink">▶ 入水口 (左侧进)</span>
            <span class="io-blink">出水口 (右侧出) ▶</span>
        </div>
        <div class="grid-container" id="grid"></div>
    </div>

    <button class="btn" onclick="initGame()">重新生成当前关卡</button>

    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <h2>LEVEL CLEAR!</h2>
            <div id="win-details" style="font-size: 14px; line-height: 1.6;"></div>
            <div id="win-medal" class="medal"></div>
            <button class="btn" style="width:100%;" onclick="closeWinOverlay()">进入下一关</button>
        </div>
    </div>

    <script>
        // 从本地存储读取模式，若没有则默认设为 false (得分模式)
        let STRICT_MODE = localStorage.getItem('pipe_strict_mode') === 'true';
        
        const SIZE = 10;
        let gridData = [];

        const TILE_TYPES = {
            STRAIGHT_H: [false, true, false, true],
            STRAIGHT_V: [true, false, true, false],
            ELBOW_BR:   [false, true, true, false],
            ELBOW_BL:   [false, false, true, true],
            ELBOW_TR:   [true, true, false, false],
            ELBOW_TL:   [true, false, false, true],
            TEE_NOT_T:  [false, true, true, true],
            TEE_NOT_R:  [true, false, true, true],
            TEE_NOT_B:  [true, true, false, true],
            TEE_NOT_L:  [true, true, true, false],
            CROSS:      [true, true, true, true]
        };

        // 切换模式并记忆
        function switchMode(isStrict) {
            STRICT_MODE = isStrict;
            localStorage.setItem('pipe_strict_mode', isStrict);
            updateModeUI();
            checkWaterFlow(); // 切换模式后即时刷新当前水流判定
        }

        function updateModeUI() {
            document.getElementById('mode-strict').classList.toggle('active', STRICT_MODE);
            document.getElementById('mode-score').classList.toggle('active', !STRICT_MODE);
        }

        function initGame() {
            updateModeUI();
            gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
            const path = generateRandomPath();
            applyPathTiles(path);
            fillDistractions();
            randomizeRotations();
            renderGrid();
            checkWaterFlow();
        }

        // DFS 后台唯一路径保证
        function generateRandomPath() {
            let visited = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
            let path = [];
            function dfs(r, c) {
                visited[r][c] = true;
                path.push({r, c});
                if (r === SIZE - 1 && c === SIZE - 1) return true;
                let dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];
                dirs.sort(() => Math.random() - 0.5);
                for (let [dr, dc] of dirs) {
                    let nr = r + dr; let nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && !visited[nr][nc]) {
                        if (dfs(nr, nc)) return true;
                    }
                }
                path.pop();
                return false;
            }
            dfs(0, 0);
            return path;
        }

        function applyPathTiles(path) {
            let requiredPorts = Array(SIZE).fill().map(() => Array(SIZE).fill().map(() => [false, false, false, false]));
            requiredPorts[0][0][3] = true; 
            requiredPorts[SIZE-1][SIZE-1][1] = true; 

            for (let i = 0; i < path.length; i++) {
                let curr = path[i];
                if (i > 0) requiredPorts[curr.r][curr.c][getDirection(curr, path[i-1])] = true;
                if (i < path.length - 1) requiredPorts[curr.r][curr.c][getDirection(curr, path[i+1])] = true;

                gridData[curr.r][curr.c] = {
                    basePorts: [...requiredPorts[curr.r][curr.c]],
                    rotation: 0, filled: false, isPath: true
                };
            }
        }

        function getDirection(from, to) {
            if (to.r < from.r) return 0;
            if (to.c > from.c) return 1;
            if (to.r > from.r) return 2;
            if (to.c < from.c) return 3;
            return 0;
        }

        function fillDistractions() {
            const types = Object.values(TILE_TYPES);
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (!gridData[r][c]) {
                        let randomType = types[Math.floor(Math.random() * types.length)];
                        gridData[r][c] = {
                            basePorts: [...randomType],
                            rotation: 0, filled: false, isPath: false
                        };
                    }
                }
            }
        }

        function randomizeRotations() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    gridData[r][c].rotation = Math.floor(Math.random() * 4);
                }
            }
        }

        function getCurrentPorts(cell) {
            let current = [false, false, false, false];
            for (let i = 0; i < 4; i++) {
                let origIndex = (i - cell.rotation + 4) % 4;
                current[i] = cell.basePorts[origIndex];
            }
            return current;
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cellData = gridData[r][c];
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.id = `cell-${r}-${c}`;
                    // 移动端及PC端同一点击事件处理器
                    cellDiv.onclick = () => rotateCell(r, c);

                    const innerDiv = document.createElement('div');
                    innerDiv.className = 'pipe-inner';
                    innerDiv.style.transform = `rotate(${cellData.rotation * 90}deg)`;

                    const core = document.createElement('div');
                    core.className = 'pipe-core';
                    innerDiv.appendChild(core);

                    for (let i = 0; i < 4; i++) {
                        if (cellData.basePorts[i]) {
                            const branch = document.createElement('div');
                            branch.className = `pipe-branch branch-${i}`;
                            innerDiv.appendChild(branch);
                        }
                    }
                    cellDiv.appendChild(innerDiv);
                    container.appendChild(cellDiv);
                }
            }
        }

        function rotateCell(r, c) {
            let cell = gridData[r][c];
            cell.rotation = (cell.rotation + 1) % 4;
            const cellDiv = document.getElementById(`cell-${r}-${c}`);
            const innerDiv = cellDiv.querySelector('.pipe-inner');
            innerDiv.style.transform = `rotate(${cell.rotation * 90}deg)`;
            checkWaterFlow();
        }

        function checkWaterFlow() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) gridData[r][c].filled = false;
            }

            let queue = [];
            let visited = Array(SIZE).fill().map(() => Array(SIZE).fill(false));

            let startCell = gridData[0][0];
            if (getCurrentPorts(startCell)[3]) {
                queue.push({r: 0, c: 0});
                visited[0][0] = true;
            }

            const dr = [-1, 0, 1, 0];
            const dc = [0, 1, 0, -1];
            let filledCount = 0;

            while (queue.length > 0) {
                let curr = queue.shift();
                gridData[curr.r][curr.c].filled = true;
                filledCount++;

                let currPorts = getCurrentPorts(gridData[curr.r][curr.c]);
                for (let i = 0; i < 4; i++) {
                    if (currPorts[i]) {
                        let nr = curr.r + dr[i]; let nc = curr.c + dc[i];
                        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && !visited[nr][nc]) {
                            let neighborPorts = getCurrentPorts(gridData[nr][nc]);
                            if (neighborPorts[(i + 2) % 4]) {
                                visited[nr][nc] = true;
                                queue.push({r: nr, c: nc});
                            }
                        }
                    }
                }
            }

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cellDiv = document.getElementById(`cell-${r}-${c}`);
                    if (gridData[r][c].filled) cellDiv.classList.add('filled');
                    else cellDiv.classList.remove('filled');
                }
            }

            let baseScore = filledCount * 10;
            document.getElementById('water-count').innerText = filledCount;
            document.getElementById('live-score').innerText = baseScore;

            // 分支或回路检测
            let hasBranchOrLoop = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (gridData[r][c].filled) {
                        let activeConnections = 0;
                        let ports = getCurrentPorts(gridData[r][c]);
                        for(let i=0; i<4; i++) {
                            if(ports[i]) {
                                let nr = r + dr[i]; let nc = c + dc[i];
                                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && gridData[nr][nc].filled) {
                                    if(getCurrentPorts(gridData[nr][nc])[(i+2)%4]) activeConnections++;
                                }
                            }
                        }
                        if (activeConnections > 2) hasBranchOrLoop = true;
                    }
                }
            }

            let endCell = gridData[SIZE-1][SIZE-1];
            let isEndConnected = endCell.filled && getCurrentPorts(endCell)[1];

            if (isEndConnected) {
                if (STRICT_MODE && hasBranchOrLoop) return; // 严格模式有分叉则不触发胜利

                setTimeout(() => {
                    const details = document.getElementById('win-details');
                    const medal = document.getElementById('win-medal');
                    
                    if (STRICT_MODE) {
                        details.innerHTML = `完美达成单向纯净引水！<br>总得分: <span style='color:var(--pipe-water)'>${baseScore}</span> 分`;
                        medal.innerText = "🟩 获得勋章：【完美纯净流】";
                    } else {
                        let finalScore = baseScore;
                        let medalText = "提示：尝试完美单线或扩充更大面积！";
                        if (!hasBranchOrLoop) {
                            finalScore += 200;
                            medalText = "⚡ 奇迹！开放模式下达成纯净单线：【极简主义】+200分";
                        } else if (filledCount > 25) {
                            finalScore += 100;
                            medalText = "🔋 壮观！激活了超大面积绿能：【矩阵蓄水池】+100分";
                        }
                        details.innerHTML = `本次通关共充满 <span style='color:var(--pipe-water)'>${filledCount}</span> 个网格。<br>总结算得分: <span style='color:#ffd700; font-size:18px;'>${finalScore}</span> 分`;
                        medal.innerText = medalText;
                    }
                    document.getElementById('winOverlay').classList.add('show');
                }, 300);
            }
        }

        function closeWinOverlay() {
            document.getElementById('winOverlay').classList.remove('show');
            initGame();
        }

        window.onload = initGame;
    </script>
</body>
</html>
